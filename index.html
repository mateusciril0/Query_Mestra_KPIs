<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Mestra KPIs - Sistema HTML</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #111827;
      --panel: #ffffff;
      --panel-soft: #f3f4f6;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #dc2626;
      --accent-dark: #991b1b;
      --ok: #059669;
      --warn: #d97706;
      --shadow: 0 12px 30px rgba(0,0,0,0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937 40%, #7f1d1d);
      color: var(--text);
    }
    .app { max-width: 1680px; margin: 0 auto; padding: 20px; }
    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      backdrop-filter: blur(8px);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0 0 8px 0; font-size: 28px; }
    .hero p { margin: 0; color: rgba(255,255,255,0.86); line-height: 1.5; }

    .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .tab-btn {
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      transition: .2s ease;
      font-weight: bold;
    }
    .tab-btn.active, .tab-btn:hover { background: white; color: var(--accent-dark); }

    .panel {
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: none;
    }
    .panel.active { display: block; }

    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .card { background: var(--panel-soft); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .col-12 { grid-column: span 12; }
    .col-8 { grid-column: span 8; }
    .col-4 { grid-column: span 4; }
    @media (max-width: 1100px) { .col-8, .col-4 { grid-column: span 12; } }

    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
    .toolbar.tight { margin-bottom: 8px; }
    button, .file-label {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      transition: .2s ease;
    }
    button.primary, .file-label.primary { background: var(--accent); color: white; }
    button.primary:hover, .file-label.primary:hover { background: var(--accent-dark); }
    button.secondary { background: white; border: 1px solid var(--border); color: var(--text); }
    button.success { background: var(--ok); color: white; }
    button.warn { background: var(--warn); color: white; }
    button.small { padding: 7px 10px; font-size: 12px; }

    input[type="file"] { display: none; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      font-size: 12px;
    }

    /* ESTILO NOVO: Células editáveis invisíveis (parecem texto normal até clicar) */
    .editable-cell {
      min-width: 60px;
      min-height: 18px;
      padding: 6px;
      border: 1px solid transparent;
      border-radius: 6px;
      outline: none;
      transition: all 0.2s;
      white-space: pre-wrap; /* Permite quebrar linha se o texto for muito grande */
      word-break: break-word;
      cursor: text;
    }
    .editable-cell:hover {
      background: rgba(0,0,0,0.03);
      border-color: #d1d5db;
    }
    .editable-cell:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
    }

    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 900px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .kpis { grid-template-columns: 1fr; } }
    .kpi { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
    .kpi .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .kpi .value { font-size: 28px; font-weight: bold; margin-top: 6px; }

    .table-wrap { overflow: auto; border: 1px solid var(--border); border-radius: 16px; background: white; max-height: 68vh; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 8px;
      font-size: 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      background: #111827;
      color: white;
      z-index: 2;
      white-space: nowrap;
    }

    .muted { color: var(--muted); }
    .footer-note { color: var(--muted); font-size: 12px; margin-top: 12px; line-height: 1.5; }
    .log {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 16px;
      padding: 14px;
      min-height: 120px;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
      font-size: 12px;
      overflow: auto;
    }
    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #fee2e2;
      color: #991b1b;
    }
    .status.ok { background: #d1fae5; color: #065f46; }
    .search-box { max-width: 340px; width: 100%; }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>Query Mestra KPIs - Sistema HTML</h1>
      <p>Versão de Leitura: Textos livres para validação, clique para editar, cálculos otimizados e inclusão de linha no topo.</p>
    </div>

    <div class="tabs" id="tabs"></div>

    <section class="panel active" id="tab-dashboard"></section>
    <section class="panel" id="tab-todos"></section>
    <section class="panel" id="tab-sla"></section>
    <section class="panel" id="tab-nao"></section>
    <section class="panel" id="tab-arvore"></section>
    <section class="panel" id="tab-equipe"></section>
    <section class="panel" id="tab-minimos"></section>
  </div>

  <script>
    const state = {
      slaRows: [],
      naoRows: [],
      todosRows: [],
      manual: loadManualData(),
      log: [],
      filters: { arvore: '', equipe: '', minimos: '' },
      previews: { arvore: 300, equipe: 300, minimos: 300 }
    };

    const TAB_LIST = [
      { id: 'dashboard', label: 'Painel Principal' },
      { id: 'todos', label: 'Todos_Tickets_Acrescentar' },
      { id: 'sla', label: 'SLA_Chamados' },
      { id: 'nao', label: 'Nao_Concluidos' },
      { id: 'arvore', label: 'Arvore_Ativos' },
      { id: 'equipe', label: 'Equipe_Trabalho' },
      { id: 'minimos', label: 'Minimo_Diario_Preventiva' }
    ];

    const OUTPUT_COLUMNS = [
      'Nº', 'Cód Ponto', 'Identificador do Local', 'Ponto', 'Ambiente', 'Estado', 'Praça', 'Área de Trabalho', 'Nível', 'Tipo de Atividade',
      'Status', 'Técnico', 'Data de Criação', 'Data de Encerramento', 'Início do Serviço', 'Conclusão do Serviço',
      'Centro de Custo', 'Cód Projeto', 'Descrição Projeto', 'Tipo Ativo', 'Especialidade', 'Turno', 'Dupla Atendimento',
      'Nome do Mês Conclusão', 'Minutos_Puros_Inicio', 'Minutos_Puros_Conclusão', 'Dia_do_Serviço', 'Dia_da_Conclusão',
      'Primeiro_Horario_Min', 'Último_Horario_Máx', 'É_Primeiro_Servico_do_Dia', 'É_Ultimo_Servico_do_Dia'
    ];

    const MANUAL_SCHEMAS = {
      arvore: ['Cód Projeto', 'Descrição Projeto', 'Centro de Custo', 'Codigo SEP', 'Nº Eletro', 'Nº Parada', 'Identificador do Local', 'Ponto', 'Endereço', 'Bairro', 'Cidade', 'Monitores Atuais', 'Estado', 'Praça', 'Tipo de Equipamento', 'Tipo de Estabelecimento', 'Latitude', 'Longitude', 'Status', 'Comercializado', 'Modelo de Abrigo', 'Tipo Ativo'],
      equipe: ['Praça', 'Nome', 'E-mail', 'Tipo de Responsabilidade', 'Nome da Dupla', 'Turno', 'Mês', 'Ano', 'Dupla Atendimento'],
      minimos: ['Tipo de Atividade', 'Dupla Atendimento', 'Dia_do_Serviço', 'Dia_da_Conclusão', 'Primeiro_Horario_Min', 'Último_Horario_Máx']
    };

    const REMOVE_COLUMNS_COMMON = [
      'ELT', 'É prioridade?', 'Precisa de Liberação?', 'Relacionamento Externo', 'Responsável', 'Manutenção dos Elevadores',
      'Ultimo Histórico - Usuario', 'Ultimo Histórico - Data', 'Ultimo Histórico', 'Observações do Chamado', 'Observações'
    ];

    function loadManualData() {
      const raw = localStorage.getItem('query_mestra_kpis_manual_data_v4');
      if (raw) {
        try { return JSON.parse(raw); } catch (_) {}
      }
      return {
        arvore: [],
        equipe: [],
        minimos: []
      };
    }

    function persistManualData() {
      try {
        const safe = {
          equipe: state.manual.equipe || [],
          minimos: state.manual.minimos || [],
          arvore: Array.isArray(state.manual.arvore) && state.manual.arvore.length <= 2000 ? state.manual.arvore : []
        };
        localStorage.setItem('query_mestra_kpis_manual_data_v4', JSON.stringify(safe));
        if ((state.manual.arvore || []).length > 2000) {
          log('Equipes e mínimos foram salvos. A Arvore_Ativos ficou apenas em memória por ser muito grande.');
        } else {
          log('Tabelas manuais salvas com sucesso.');
        }
      } catch (error) {
        console.error(error);
        log('Não foi possível salvar tudo no navegador. A base grande seguirá disponível até fechar ou recarregar a página.');
      }
    }

    function log(message) {
      const stamp = new Date().toLocaleString('pt-BR');
      state.log.unshift(`[${stamp}] ${message}`);
      renderDashboard();
    }

    function normalizeText(value) {
      return String(value ?? '')
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function toText(value) { return String(value ?? '').trim(); }

    function parseCsvLine(line, delimiter) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else inQuotes = !inQuotes;
        } else if (char === delimiter && !inQuotes) {
          result.push(current);
          current = '';
        } else current += char;
      }
      result.push(current);
      return result;
    }

    function findHeaderRow(rows) {
      let bestIndex = 0;
      let bestScore = -1;
      const keys = ['nº', 'cod ponto', 'codigo sep', 'identificador do local', 'ponto', 'tecnico', 'tipo de atividade', 'descricao projeto', 'dupla atendimento'];
      for (let i = 0; i < Math.min(rows.length, 30); i++) {
        const norm = (rows[i] || []).map(normalizeText);
        let score = 0;
        keys.forEach(k => { if (norm.some(cell => cell.includes(k))) score++; });
        if (score > bestScore) { bestScore = score; bestIndex = i; }
      }
      return bestIndex;
    }

    function csvTextToObjects(text) {
      const clean = String(text || '').replace(/^\uFEFF/, '');
      const lines = clean.split(/\r?\n/).filter(line => line.trim() !== '');
      if (!lines.length) return [];
      const firstLine = lines[0] || '';
      const delimiter = (firstLine.match(/;/g) || []).length >= ((firstLine.match(/,/g) || []).length) ? ';' : ',';
      const rows = lines.map(line => parseCsvLine(line, delimiter));
      const headerIndex = findHeaderRow(rows);
      const headers = (rows[headerIndex] || []).map(h => String(h || '').trim());
      const body = rows.slice(headerIndex + 1).filter(r => r.some(cell => String(cell ?? '').trim() !== ''));
      return body.map(row => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = row[idx] ?? '');
        return obj;
      });
    }

    function sheetToObjects(sheet) {
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
      const headerIndex = findHeaderRow(rows);
      const headers = (rows[headerIndex] || []).map(h => String(h || '').trim());
      const body = rows.slice(headerIndex + 1).filter(r => r.some(cell => String(cell ?? '').trim() !== ''));
      return body.map(row => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = row[idx] ?? '');
        return obj;
      });
    }

    async function importObjectsFromFile(file, expectedSheetName) {
      if (file.name.toLowerCase().endsWith('.csv')) return csvTextToObjects(await file.text());
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array' });
      let sheetName = wb.SheetNames.find(name => normalizeText(name) === normalizeText(expectedSheetName));
      if (!sheetName) sheetName = wb.SheetNames[0];
      return sheetToObjects(wb.Sheets[sheetName]);
    }

    function excelDateToJS(value) {
      if (value instanceof Date) return value;
      if (typeof value === 'number') {
        const parsed = XLSX.SSF.parse_date_code(value);
        if (!parsed) return null;
        return new Date(parsed.y, parsed.m - 1, parsed.d, parsed.H || 0, parsed.M || 0, parsed.S || 0);
      }
      if (value == null || String(value).trim() === '') return null;
      
      const raw = String(value).trim();
      
      const br = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
      if (br) {
        const [, d, m, y, hh = '0', mm = '0', ss = '0'] = br;
        return new Date(Number(y.length === 2 ? '20' + y : y), Number(m) - 1, Number(d), Number(hh), Number(mm), Number(ss));
      }
      
      const iso = new Date(raw);
      if (!Number.isNaN(iso.getTime())) return iso;
      
      return null;
    }

    function formatDateTime(value) {
      const d = excelDateToJS(value);
      return d ? d.toLocaleString('pt-BR') : '';
    }

    function formatDateOnly(value) {
      const d = excelDateToJS(value);
      return d ? d.toLocaleDateString('pt-BR') : '';
    }

    function monthNameFromDate(value) {
      const d = excelDateToJS(value);
      if (!d) return '';
      return d.toLocaleDateString('pt-BR', { month: 'long' });
    }

    function timeToMinutesPower(value) {
      try {
        const d = excelDateToJS(value);
        if (!d || isNaN(d.getTime())) return null;
        const base = d.getHours() * 60 + d.getMinutes();
        return d.getHours() < 6 ? base + 1440 : base;
      } catch {
        return null;
      }
    }

    function removeColumns(rows, columnsToRemove) {
      return rows.map(row => {
        const obj = { ...row };
        columnsToRemove.forEach(col => delete obj[col]);
        return obj;
      });
    }

    function dedupeByField(rows, fieldName) {
      const seen = new Set();
      const result = [];
      for (const row of rows) {
        const key = toText(row[fieldName]);
        if (!key || seen.has(key)) continue;
        seen.add(key);
        result.push(row);
      }
      return result;
    }

    function leftJoinSingle(leftRows, rightRows, leftKeyFn, rightKeyFn, rightFieldMap) {
      const index = new Map();
      rightRows.forEach(r => {
        const key = rightKeyFn(r);
        if (!index.has(key)) index.set(key, r);
      });
      return leftRows.map(l => {
        const found = index.get(leftKeyFn(l));
        const row = { ...l };
        Object.entries(rightFieldMap).forEach(([dest, src]) => row[dest] = found ? (found[src] ?? '') : '');
        return row;
      });
    }

    function computeMinimoDiarioFromPowerQueryLogic() {
      let rows = [...state.slaRows, ...state.naoRows];
      rows = removeColumns(rows, REMOVE_COLUMNS_COMMON);

      rows = leftJoinSingle(
        rows,
        state.manual.arvore,
        l => normalizeText(l['Cód Ponto']),
        r => normalizeText(r['Codigo SEP'] || r['Código SEP']),
        {
          'Centro de Custo': 'Centro de Custo',
          'Cód Projeto': 'Cód Projeto',
          'Descrição Projeto': 'Descrição Projeto',
          'Tipo Ativo': 'Tipo Ativo'
        }
      );

      rows = leftJoinSingle(
        rows,
        state.manual.equipe,
        l => normalizeText(l['Técnico']),
        r => normalizeText(r['Nome']),
        {
          'Especialidade': 'Tipo de Responsabilidade',
          'Turno': 'Turno',
          'Dupla Atendimento': 'Dupla Atendimento'
        }
      );

      rows = dedupeByField(rows, 'Nº');

      rows = rows.map(r => ({
        ...r,
        'Nome do Mês Conclusão': monthNameFromDate(r['Conclusão do Serviço']),
        'Dia_do_Serviço': formatDateOnly(r['Início do Serviço']),
        'Dia_da_Conclusão': formatDateOnly(r['Conclusão do Serviço']),
        'Minutos_Puros_Inicio': timeToMinutesPower(r['Início do Serviço']),
        'Minutos_Puros_Conclusão': timeToMinutesPower(r['Conclusão do Serviço'])
      }));

      const groups = new Map();
      rows.forEach(r => {
        const key = [
          toText(r['Tipo de Atividade']),
          toText(r['Dupla Atendimento']),
          toText(r['Dia_do_Serviço']),
          toText(r['Dia_da_Conclusão'])
        ].join('||');

        if (!groups.has(key)) {
          groups.set(key, {
            'Tipo de Atividade': r['Tipo de Atividade'] ?? '',
            'Dupla Atendimento': r['Dupla Atendimento'] ?? '',
            'Dia_do_Serviço': r['Dia_do_Serviço'] ?? '',
            'Dia_da_Conclusão': r['Dia_da_Conclusão'] ?? '',
            'Primeiro_Horario_Min': null,
            'Último_Horario_Máx': null
          });
        }

        const g = groups.get(key);
        const ini = r['Minutos_Puros_Inicio'];
        const fim = r['Minutos_Puros_Conclusão'];

        if (typeof ini === 'number') {
          g['Primeiro_Horario_Min'] = g['Primeiro_Horario_Min'] == null ? ini : Math.min(g['Primeiro_Horario_Min'], ini);
        }
        if (typeof fim === 'number') {
          g['Último_Horario_Máx'] = g['Último_Horario_Máx'] == null ? fim : Math.max(g['Último_Horario_Máx'], fim);
        }
      });

      return Array.from(groups.values()).map(r => ({
        ...r,
        'Primeiro_Horario_Min': r['Primeiro_Horario_Min'] ?? '',
        'Último_Horario_Máx': r['Último_Horario_Máx'] ?? ''
      }));
    }

    function computeTodosTicketsPowerQuery() {
      let rows = [...state.slaRows, ...state.naoRows];
      rows = removeColumns(rows, REMOVE_COLUMNS_COMMON);

      rows = leftJoinSingle(
        rows,
        state.manual.arvore,
        l => `${normalizeText(l['Identificador do Local'])}||${normalizeText(l['Cód Ponto'])}`,
        r => `${normalizeText(r['Codigo SEP'] || r['Código SEP'])}||${normalizeText(r['Identificador do Local'])}`,
        {
          'Centro de Custo': 'Centro de Custo',
          'Cód Projeto': 'Cód Projeto',
          'Descrição Projeto': 'Descrição Projeto',
          'Tipo Ativo': 'Tipo Ativo'
        }
      );

      rows = leftJoinSingle(
        rows,
        state.manual.equipe,
        l => normalizeText(l['Técnico']),
        r => normalizeText(r['Nome']),
        {
          'Especialidade': 'Tipo de Responsabilidade',
          'Turno': 'Turno',
          'Dupla Atendimento': 'Dupla Atendimento'
        }
      );

      rows = dedupeByField(rows, 'Nº');

      rows = rows.map(r => {
        const inicioMin = timeToMinutesPower(r['Início do Serviço']);
        const fimMin = timeToMinutesPower(r['Conclusão do Serviço']);
        
        return {
          ...r,
          'Nome do Mês Conclusão': monthNameFromDate(r['Conclusão do Serviço']),
          'Início do Serviço': formatDateTime(r['Início do Serviço']),
          'Conclusão do Serviço': formatDateTime(r['Conclusão do Serviço']),
          'Data de Encerramento': formatDateTime(r['Data de Encerramento']),
          'Data de Criação': formatDateTime(r['Data de Criação']),
          'Dia_do_Serviço': formatDateOnly(r['Início do Serviço']),
          'Dia_da_Conclusão': formatDateOnly(r['Conclusão do Serviço']),
          'Minutos_Puros_Inicio': inicioMin,
          'Minutos_Puros_Conclusão': fimMin
        };
      }).filter(r => toText(r['Nº']) !== '');

      rows = leftJoinSingle(
        rows,
        state.manual.minimos,
        l => `${normalizeText(l['Tipo de Atividade'])}||${normalizeText(l['Dupla Atendimento'])}||${l['Dia_do_Serviço']}`,
        r => `${normalizeText(r['Tipo de Atividade'])}||${normalizeText(r['Dupla Atendimento'])}||${formatDateOnly(r['Dia_do_Serviço'])}`,
        {
          'Primeiro_Horario_Min': 'Primeiro_Horario_Min',
          'Último_Horario_Máx': 'Último_Horario_Máx'
        }
      );

      rows = rows.map(r => ({
        ...r,
        'É_Primeiro_Servico_do_Dia': (r['Minutos_Puros_Inicio'] != null && String(r['Minutos_Puros_Inicio']) === String(r['Primeiro_Horario_Min'])) ? 'SIM' : 'NÃO',
        'É_Ultimo_Servico_do_Dia': (r['Minutos_Puros_Conclusão'] != null && String(r['Minutos_Puros_Conclusão']) === String(r['Último_Horario_Máx'])) ? 'SIM' : 'NÃO'
      }));

      return rows;
    }

    async function importBaseFile(file, target) {
      try {
        const expectedSheet = target === 'sla' ? 'SLA_Chamados' : 'Nao_Concluidos';
        let rows = await importObjectsFromFile(file, expectedSheet);
        if (target === 'sla') {
          rows = rows.map(r => ({ ...r, 'Cód Ponto': toText(r['Cód Ponto']) }));
          state.slaRows = rows;
        } else {
          state.naoRows = rows;
        }
        log(`${file.name} importado em ${target} com ${rows.length} linhas.`);
        renderAll();
      } catch (error) {
        console.error(error);
        alert(`Erro ao importar ${file.name}: ${error.message}`);
      }
    }

    async function importManualFile(file, key) {
      try {
        const expected = key === 'arvore' ? 'Arvore_Ativos' : key === 'equipe' ? 'Cad_Equipes' : 'Minimo_Diario_Preventiva';
        const imported = await importObjectsFromFile(file, expected);
        const schema = MANUAL_SCHEMAS[key];
        const mappedRows = imported.map(row => {
          const obj = {};
          schema.forEach(col => {
            const found = Object.entries(row).find(([k]) => normalizeText(k) === normalizeText(col));
            obj[col] = found ? found[1] : '';
          });
          if (key === 'arvore') {
            if (!obj['Codigo SEP']) obj['Codigo SEP'] = row['Codigo SEP'] || row['Código SEP'] || '';
            if (!obj['Tipo Ativo']) obj['Tipo Ativo'] = obj['Tipo de Equipamento'] || row['Tipo de Equipamento'] || '';
          }
          return obj;
        }).filter(row => Object.values(row).some(v => toText(v) !== ''));

        state.manual[key] = mappedRows;
        persistManualData();
        log(`${file.name} importado em ${key} com ${mappedRows.length} linhas.`);
        renderAll();
      } catch (error) {
        console.error(error);
        alert(`Erro ao importar ${file.name}: ${error.message}`);
      }
    }

    function addManualRow(key) {
      const row = {};
      MANUAL_SCHEMAS[key].forEach(col => row[col] = '');
      state.manual[key].unshift(row);
      persistManualData();
      renderManualTab(key);
    }

    function deleteManualRow(key, index) {
      state.manual[key].splice(index, 1);
      persistManualData();
      renderManualTab(key);
    }

    function updateManualCell(key, rowIndex, column, value) {
      state.manual[key][rowIndex][column] = value;
    }

    function saveManualRow(key, rowIndex) {
      const row = state.manual[key][rowIndex];
      const hasValue = Object.values(row).some(v => toText(v) !== '');
      if (!hasValue) {
        alert('A linha está vazia. Preencha pelo menos um campo antes de salvar.');
        return;
      }
      persistManualData();
      log(`Linha salva em ${key}.`);
      renderManualTab(key);
    }

    function saveAllManual(key) {
      persistManualData();
      log(`Tabela ${key} salva.`);
      renderManualTab(key);
    }

    function updateFilter(key, value) {
      state.filters[key] = value;
      renderManualTab(key);
    }

    function exportWorkbook() {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.todosRows), 'Todos_Tickets_Acrescentar');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.slaRows), 'SLA_Chamados');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.naoRows), 'Nao_Concluidos');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.manual.arvore), 'Arvore_Ativos');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.manual.equipe), 'Equipe_Trabalho');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.manual.minimos), 'Minimo_Diario_Preventiva');
      XLSX.writeFile(wb, 'Query_Mestra_KPIs_Processado.xlsx');
      log('Arquivo Excel exportado com sucesso.');
    }

    function processPowerQueries() {
      state.manual.minimos = computeMinimoDiarioFromPowerQueryLogic();
      state.todosRows = computeTodosTicketsPowerQuery();
      persistManualData();
      log(`Processamento concluído. Minimo_Diario_Preventiva: ${state.manual.minimos.length} linhas. Todos_Tickets_Acrescentar: ${state.todosRows.length} linhas.`);
      renderAll();
      openTab('todos');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderPreviewTable(rows, columns, maxRows = 200) {
      if (!rows.length) return '<div class="muted">Nenhum dado disponível.</div>';
      const previewRows = rows.slice(0, maxRows);
      return `
        <div class="muted" style="margin-bottom:8px;">Exibindo ${previewRows.length} de ${rows.length} linhas.</div>
        <div class="table-wrap">
          <table>
            <thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>
            <tbody>
              ${previewRows.map(r => `<tr>${columns.map(c => `<td>${escapeHtml(r[c] ?? '')}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderEditableTable(key, title) {
      const columns = MANUAL_SCHEMAS[key];
      const term = normalizeText(state.filters[key] || '');
      const allRows = state.manual[key] || [];
      const visibleRows = !term ? allRows : allRows.filter(row => Object.values(row).some(v => normalizeText(v).includes(term)));
      const previewRows = visibleRows.slice(0, state.previews[key]);

      return `
        <div class="card">
          <h2>${title}</h2>
          <div class="toolbar">
            <button class="primary" onclick="addManualRow('${key}')">Adicionar linha</button>
            <button class="secondary" onclick="saveAllManual('${key}')">Salvar tabela</button>
            <label class="file-label primary">Importar base Excel/CSV
              <input type="file" id="file-${key}" accept=".xlsx,.xls,.csv" />
            </label>
            <input class="search-box" type="text" id="search-${key}" placeholder="Buscar nesta aba" value="${escapeHtml(state.filters[key] || '')}" />
          </div>
          <div class="muted" style="margin-bottom:8px;">Exibindo ${previewRows.length} de ${visibleRows.length} linhas filtradas. <b>Clique em qualquer texto para editá-lo.</b></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  ${columns.map(c => `<th>${c}</th>`).join('')}
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
                ${previewRows.map((row) => {
                  const realIndex = allRows.indexOf(row);
                  return `<tr>
                    ${columns.map(col => `
                      <td>
                        <div class="editable-cell" contenteditable="true" oninput="updateManualCell('${key}', ${realIndex}, '${col.replace(/'/g, "\\'")}', this.innerText)">${escapeHtml(row[col] ?? '')}</div>
                      </td>
                    `).join('')}
                    <td>
                      <div class="toolbar tight">
                        <button class="success small" onclick="saveManualRow('${key}', ${realIndex})">Salvar</button>
                        <button class="warn small" onclick="deleteManualRow('${key}', ${realIndex})">Excluir</button>
                      </div>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <p class="footer-note">Linhas novas são criadas em branco para preenchimento manual no topo da tabela.</p>
        </div>
      `;
    }

    function renderDashboard() {
      const el = document.getElementById('tab-dashboard');
      el.innerHTML = `
        <div class="grid">
          <div class="col-12 card">
            <h2>Painel Principal</h2>
            <div class="toolbar">
              <label class="file-label primary">Importar SLA_Chamados
                <input type="file" id="file-sla" accept=".xlsx,.xls,.csv" />
              </label>
              <label class="file-label primary">Importar Nao_Concluidos
                <input type="file" id="file-nao" accept=".xlsx,.xls,.csv" />
              </label>
              <button class="success" id="btn-processar">Processar Power Query</button>
              <button class="secondary" id="btn-exportar">Exportar Excel</button>
            </div>
            <div class="kpis">
              <div class="kpi"><div class="label">SLA_Chamados</div><div class="value">${state.slaRows.length}</div></div>
              <div class="kpi"><div class="label">Nao_Concluidos</div><div class="value">${state.naoRows.length}</div></div>
              <div class="kpi"><div class="label">Arvore_Ativos</div><div class="value">${state.manual.arvore.length}</div></div>
              <div class="kpi"><div class="label">Todos_Tickets_Acrescentar</div><div class="value">${state.todosRows.length}</div></div>
            </div>
            <p class="footer-note">Fluxo: importar bases → revisar Arvore_Ativos e Equipe_Trabalho → processar Power Query → validar Todos_Tickets_Acrescentar → exportar.</p>
          </div>
          <div class="col-8 card">
            <h3>Prévia da Consolidação Final</h3>
            ${renderPreviewTable(state.todosRows, OUTPUT_COLUMNS, 30)}
          </div>
          <div class="col-4 card">
            <h3>Status</h3>
            <p><span class="status ${state.todosRows.length ? 'ok' : ''}">${state.todosRows.length ? 'Consolidado gerado' : 'Aguardando processamento'}</span></p>
            <div class="log">${escapeHtml(state.log.join('\n') || 'Sistema iniciado.')}</div>
          </div>
        </div>
      `;

      document.getElementById('file-sla').addEventListener('change', e => e.target.files[0] && importBaseFile(e.target.files[0], 'sla'));
      document.getElementById('file-nao').addEventListener('change', e => e.target.files[0] && importBaseFile(e.target.files[0], 'nao'));
      document.getElementById('btn-processar').addEventListener('click', processPowerQueries);
      document.getElementById('btn-exportar').addEventListener('click', exportWorkbook);
    }

    function renderTodos() {
      document.getElementById('tab-todos').innerHTML = `
        <div class="card">
          <h2>Todos_Tickets_Acrescentar</h2>
          <div class="toolbar">
            <button class="success" onclick="processPowerQueries()">Reprocessar</button>
            <button class="secondary" onclick="exportWorkbook()">Exportar Excel</button>
          </div>
          ${renderPreviewTable(state.todosRows, OUTPUT_COLUMNS, 500)}
        </div>
      `;
    }

    function renderSourceTab(tabId, title, rows) {
      const columns = rows.length ? Object.keys(rows[0]) : [];
      document.getElementById(`tab-${tabId}`).innerHTML = `
        <div class="card">
          <h2>${title}</h2>
          <p class="muted">Linhas importadas: ${rows.length}</p>
          ${renderPreviewTable(rows, columns, 300)}
        </div>
      `;
    }

    function renderManualTab(key) {
      const titles = {
        arvore: 'Arvore_Ativos',
        equipe: 'Equipe_Trabalho',
        minimos: 'Minimo_Diario_Preventiva'
      };
      const html = renderEditableTable(key, titles[key]);
      document.getElementById(`tab-${key}`).innerHTML = html;
      const fileInput = document.getElementById(`file-${key}`);
      if (fileInput) fileInput.addEventListener('change', e => e.target.files[0] && importManualFile(e.target.files[0], key));
      const search = document.getElementById(`search-${key}`);
      if (search) search.addEventListener('input', e => updateFilter(key, e.target.value));
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      tabs.innerHTML = TAB_LIST.map((tab, idx) => `<button class="tab-btn ${idx === 0 ? 'active' : ''}" data-tab="${tab.id}">${tab.label}</button>`).join('');
      tabs.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => openTab(btn.dataset.tab)));
    }

    function openTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === id));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${id}`).classList.add('active');
    }

    function renderAll() {
      renderDashboard();
      renderTodos();
      renderSourceTab('sla', 'SLA_Chamados', state.slaRows);
      renderSourceTab('nao', 'Nao_Concluidos', state.naoRows);
      renderManualTab('arvore');
      renderManualTab('equipe');
      renderManualTab('minimos');
    }

    renderTabs();
    renderAll();
    log('Interface carregada.');

    window.addManualRow = addManualRow;
    window.deleteManualRow = deleteManualRow;
    window.updateManualCell = updateManualCell;
    window.saveManualRow = saveManualRow;
    window.saveAllManual = saveAllManual;
    window.updateFilter = updateFilter;
    window.processPowerQueries = processPowerQueries;
    window.exportWorkbook = exportWorkbook;
  </script>
</body>
</html>
